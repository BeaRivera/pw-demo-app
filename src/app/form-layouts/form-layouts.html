<h2>Inline form</h2>

<form>
  <input placeholder="Jane Doe">
  <button class="appearance-filled">Submit</button>
</form>

<h2>Using the Grid</h2>

<form>
  <label>Email</label>
  <input type="email">

  <label>Password</label>
  <input type="password">

  <label>
    <input type="radio" name="options"> Option 1
  </label>

  <label>
    <input type="radio" name="options"> Option 2
  </label>
</form>

<h2>Basic form</h2>

<form>
  <label>Email address</label>
  <input type="email">

  <label>Password</label>
  <input type="password">

  <label>
    <input type="checkbox"> Check me out
  </label>

  <button>Submit</button>
</form>

<h2>Block form</h2>

<form>
  <input placeholder="First Name">
</form>

<h2>Form without labels</h2>

<form>
  <button>Send</button>
</form>

<h2>Horizontal form</h2>

<form>
  <button>Sign in</button>
</form>
